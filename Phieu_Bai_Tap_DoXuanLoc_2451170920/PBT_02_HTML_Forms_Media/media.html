<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Multimedia - Giới thiệu sản phẩm</title>
</head>
<body>

<h1>Giới thiệu sản phẩm</h1>

<!-- SVG inline (logo đơn giản) -->
<h2>Logo</h2>
<svg width="100" height="100">
    <circle cx="50" cy="50" r="40" fill="blue" />
    <text x="50%" y="55%" text-anchor="middle" fill="white" font-size="20">M</text>
</svg>

<!-- Ảnh sản phẩm -->
<h2>Sản phẩm</h2>

<figure>
    <img src="https://via.placeholder.com/300"
         alt="Sản phẩm 1 - điện thoại thông minh"
         loading="lazy"
         style="max-width:100%; height:auto;">
    <figcaption>Điện thoại thông minh hiện đại</figcaption>
</figure>

<figure>
    <img src="https://via.placeholder.com/300"
         alt="Sản phẩm 2 - tai nghe không dây"
         loading="lazy"
         style="max-width:100%; height:auto;">
    <figcaption>Tai nghe không dây chất lượng cao</figcaption>
</figure>

<figure>
    <img src="https://via.placeholder.com/300"
         alt="Sản phẩm 3 - đồng hồ thông minh"
         loading="lazy"
         style="max-width:100%; height:auto;">
    <figcaption>Đồng hồ thông minh tiện lợi</figcaption>
</figure>

<!-- Video YouTube -->
<h2>Video giới thiệu (YouTube)</h2>
<iframe width="560" height="315"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        title="Video giới thiệu sản phẩm"
        frameborder="0"
        allowfullscreen>
</iframe>

<!-- Video HTML -->
<h2>Video sản phẩm</h2>
<video controls width="500" poster="https://via.placeholder.com/500x300">
    <source src="video.mp4" type="video/mp4">
    <source src="video.webm" type="video/webm">
    Trình duyệt của bạn không hỗ trợ video.
</video>

<!-- Audio -->
<h2>Nhạc nền</h2>
<audio controls>
    <source src="audio.mp3" type="audio/mpeg">
    Trình duyệt của bạn không hỗ trợ audio.
</audio>

</body>
</html>
